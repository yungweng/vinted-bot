{% extends "base.html" %}
{% block title %}{{ search.name or "Suche #" ~ search.id }} - Vinted Bot{% endblock %}
{% block content %}

<header class="mb-6">
  <a href="/searches" class="mb-3 inline-flex items-center gap-1 text-xs text-muted-foreground hover:text-foreground">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    Verlauf
  </a>
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0">
      <h1 class="text-2xl font-semibold tracking-tight">{{ search.name or "Suche #" ~ search.id }}</h1>
      <a href="{{ search.url }}" target="_blank" rel="noopener" class="mt-1 block truncate text-xs text-muted-foreground hover:text-foreground">{{ search.url }}</a>
    </div>
    {% include "_status_pill.html" %}
  </div>
</header>

{% include "_search_content.html" %}

{% endblock %}
